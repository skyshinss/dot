<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 문제 생성 체험 - DOT EDUTAINMENT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* AI 데모 페이지 전용 추가 스타일 */
        .demo-container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 120px auto 60px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        
        /* 헤더 로고 이미지 스타일 */
        .logo img {
            height: 45px; /* 헤더 높이에 맞게 조절 */
            display: block;
            transition: 0.3s;
        }

        .input-group { margin-bottom: 25px; }
        
        .input-box {
            width: 100%;
            height: 100px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #3b82f6;
            border-radius: 12px;
            color: #cbd5e1;
            padding: 20px;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            cursor: default; /* 입력 불가 느낌 */
        }

        .result-box {
            margin-top: 30px;
            background: #f8fafc;
            color: #1e293b;
            padding: 25px;
            border-radius: 12px;
            min-height: 100px;
            line-height: 1.8;
            border-left: 5px solid #3b82f6;
            display: none;
            text-align: center;
        }
        
        .result-box.active { display: block; animation: fadeInUp 0.5s ease; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn.primary {
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 700;
        }
        .btn.primary:hover { background: #2563eb; transform: translateY(-2px); }
    </style>
</head>
<body>

<header class="header">
    <div class="container nav">
        <div class="logo">
            <a href="index.html"><img src="logo.jpg" alt="DOT EDUTAINMENT"></a>
        </div>
        <div class="menu-toggle" id="menuToggle">☰</div>
        <nav id="navMenu">
            <a href="index.html">Home</a>
            <a href="index.html#about">회사소개</a>
            <a href="index.html#services">서비스</a>
            <a href="mailto:contact@dotedu.kr" class="btn-contact">고객센터</a>
        </nav>
    </div>
</header>

<canvas id="network" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></canvas>

<div class="demo-container">
    <div class="center">
        <h2 style="margin-bottom: 10px; color: #fff;">AI 문제 생성 체험</h2>
        <p style="color: #cbd5e1; margin-bottom: 30px;">기본 문형을 바탕으로 AI 엔진이 유사 문항을 실시간 생성합니다.</p>
    </div>

    <div class="input-group">
        <textarea id="questionInput" class="input-box" readonly>고정 문제: 3x + 5y를 간단히 하시오.</textarea>
    </div>

    <div class="center">
        <button class="btn primary" onclick="generateProblem()" style="width: 100%; font-size: 1.1rem; padding: 15px;">AI 유사 문제 생성하기</button>
    </div>

    <div id="resultBox" class="result-box"></div>
</div>

<button id="backToTop" class="back-to-top">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<script src="script.js"></script>

<script>
    function generateProblem() {
        const result = document.getElementById("resultBox");

        // 1. 숫자 랜덤 생성 (2~25 사이)
        const a = Math.floor(Math.random() * 24) + 2;
        const b = Math.floor(Math.random() * 24) + 2;

        // 2. 결과 텍스트 구성
        const generatedQuestion = `${a}x + ${b}y를 간단히 하시오.`;

        // 3. 화면 출력
        result.innerHTML = `
            <div style="font-weight:bold; color:#3b82f6; margin-bottom:15px; font-size:0.9rem;">✨ AI 데이터 분석 및 문항 생성 결과</div>
            <div style="font-size: 1.4rem; font-weight: 800; background: #e2e8f0; padding: 20px; border-radius: 10px; color: #0f172a; display: inline-block; min-width: 80%;">
                ${generatedQuestion}
            </div>
            <div style="margin-top: 15px; color: #64748b; font-size: 0.85rem;">
                수학적 구조 분석을 통해 동일 난이도의 유사 문항을 생성하였습니다.
            </div>
        `;
        
        result.classList.add("active");
    }
</script>
</body>
</html>
