<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 문제 생성 체험 - DOT EDUTAINMENT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .demo-container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 120px auto 60px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        
        .logo img {
            height: 45px;
            display: block;
        }

        .input-group { margin-bottom: 25px; }
        
        .input-box {
            width: 100%;
            height: 80px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #3b82f6;
            border-radius: 12px;
            color: #60a5fa;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            resize: none;
            outline: none;
            cursor: default;
            text-align: center;
        }

        .result-box {
            margin-top: 30px;
            background: #ffffff;
            color: #1e293b;
            padding: 30px;
            border-radius: 15px;
            display: none;
            border-left: 8px solid #3b82f6;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .result-box.active { display: block; animation: fadeInUp 0.5s ease; }

        .answer-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #cbd5e1;
        }

        .solution { color: #64748b; font-style: italic; margin-bottom: 10px; }
        .final-answer { font-size: 1.5rem; font-weight: 800; color: #2E75B6; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn.primary {
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            padding: 18px;
            font-weight: 700;
            border-radius: 12px;
            transition: 0.3s;
        }
        .btn.primary:hover { background: #2563eb; transform: scale(1.02); }
    </style>
</head>
<body>

<header class="header">
    <div class="container nav">
        <div class="logo">
            <a href="index.html"><img src="logo.png" alt="DOT EDUTAINMENT"></a>
        </div>
        <nav id="navMenu">
            <a href="index.html">Home</a>
            <a href="index.html#about">회사소개</a>
            <a href="mailto:contact@dotedu.co.kr" class="btn-contact">고객센터</a>
        </nav>
    </div>
</header>

<canvas id="network" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></canvas>

<div class="demo-container">
    <div class="center" style="text-align: center;">
        <h2 style="margin-bottom: 10px; color: #fff;">AI 문제 생성 체험</h2>
        <p style="color: #cbd5e1; margin-bottom: 30px;">AI가 문형을 분석하여 유사 문항과 정답을 실시간으로 도출합니다.</p>
    </div>

    <div class="input-group">
        <textarea id="questionInput" class="input-box" readonly>기본 문형: 3x + 4x를 간단히 하시오.</textarea>
    </div>

    <button class="btn primary" onclick="generateProblem()">AI 유사 문제 및 정답 생성</button>

    <div id="resultBox" class="result-box">
        </div>
</div>

<script src="script.js"></script>

<script>
    function generateProblem() {
        const result = document.getElementById("resultBox");

        // 1. 랜덤 숫자 생성 (2~30 사이)
        const n1 = Math.floor(Math.random() * 29) + 2;
        const n2 = Math.floor(Math.random() * 29) + 2;
        const sum = n1 + n2;

        // 2. 결과 화면 구성
        result.innerHTML = `
            <div style="font-weight:bold; color:#3b82f6; margin-bottom:10px;">✨ AI 생성 문제</div>
            <div style="font-size: 1.4rem; font-weight: 700; margin-bottom: 15px;">
                ${n1}x + ${n2}x를 간단히 하시오.
            </div>

            <div class="answer-section">
                <div class="solution">
                    <strong>[해설]</strong><br>
                    (${n1} + ${n2})x = ${sum}x
                </div>
                <div class="final-answer">
                    <span style="font-size: 1rem; color: #1e293b;">정답:</span> ${sum}x
                </div>
            </div>
        `;
        
        result.classList.add("active");
    }
</script>
</body>

<footer class="footer">
    <div class="container">
        <div class="footer-content" style="margin-bottom: 30px;">
            <div class="logo" style="margin-bottom: 20px; opacity: 0.8; filter: grayscale(1);">
                <img src="logo.png" alt="DOT EDUTAINMENT" style="height: 35px; margin: 0 auto;">
            </div>
            <p style="margin-bottom: 10px; line-height: 1.8;">

            </p>

        </div>
        <p class="copyright">© 2026 DOT EDUTAINMENT. All rights reserved.</p>
    </div>
</footer>

</html>
